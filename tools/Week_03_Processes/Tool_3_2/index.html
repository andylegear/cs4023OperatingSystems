<html lang="en">
<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #003366; padding: 0.9rem 2rem; border-bottom: 3px solid #ff8c00; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }

  header p { font-size: 0.82rem; color: #94a3b8; }

  .quiz-card { background: #1e293b; border: 2px solid #ff8c00; border-radius: 14px; padding: 2rem; max-width: 600px; margin: 0 auto; }

  .q-option { display: block; width: 100%; text-align: left; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 0.6rem 1rem; margin: 0.3rem 0; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; font-weight: 400; }
  .q-option:hover:not(:disabled) { border-color: #ff8c00; }
  .q-option.correct-ans { background: #14532d; border-color: #22c55e; color: #86efac; }
  .q-option.wrong-ans { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
  .q-explanation { font-size: 0.8rem; color: #64748b; margin-top: 0.5rem; display: none; }
  .q-explanation.show { display: block; }
  .output-box { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 0.8rem; font-family: monospace; font-size: 0.82rem; color: #a3e635; margin: 0.5rem 0; }
  /* Responsive / mobile */
  @media (max-width: 768px) {
    .workspace { flex-direction: column; overflow: visible; }
    .code-panel { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid #1e293b; }
    .tree-panel { height: 55vw; min-height: 240px; }
    .quiz-overlay { padding: 0.75rem; -webkit-overflow-scrolling: touch; }

    select, button { font-size: 0.8rem; }
  }
</style>

<body>
<header>
  <div>
    <h1>🔀 Tool 3.2 — Fork/Exec Visualiser</h1>
    <p>CS4023 Operating Systems · Step through fork/exec — watch the process tree grow</p>
  </div>
  <div class="controls">
    <select id="scenarioSelect" onchange="loadScenario()">
      <option value="A">Scenario A — Basic fork()</option>
      <option value="B">Scenario B — fork() + exec()</option>
      <option value="C">Scenario C — Double fork (4 processes)</option>
    </select>
    <button class="btn-orange" id="stepBtn" onclick="doStep()">▶ Step</button>

  </div>
</header>

<div class="step-counter" id="stepCounter">Step 0 — Select a scenario and press Step</div>

<div class="workspace">
  <div class="code-panel" id="codePanel"></div>
  <div class="tree-panel">
    <svg id="treeSvg" viewBox="0 0 700 440"></svg>
  </div>
</div>
<div class="annotation" id="annotation">Press <strong>Step</strong> to begin execution trace.</div>

<!-- Quiz overlay -->
<div class="quiz-overlay" id="quizOverlay">
  <div class="quiz-card">
    <h2>🧠 Prediction Questions</h2>
    <div id="quizContent"></div>
    <button class="btn-slate" style="margin-top:1.5rem" onclick="document.getElementById('quizOverlay').classList.remove('active')">← Back to diagram</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   Scenario definitions
══════════════════════════════════════════════════════════ */
const scenarios = {
A: {
  title: "Basic fork()",
  code: [
    { text: '#include <stdio.h>',          note: null },
    { text: '#include <unistd.h>',         note: null },
    { text: '#include <sys/wait.h>',       note: null },
    { text: '',                            note: null },
    { text: 'int main() {',               note: null },
    { text: '    int x = 5;',             note: 'Initialise x=5 in parent address space.' },
    { text: '    pid_t pid = fork();',     note: '<strong>fork()</strong> splits execution. Parent gets child PID; child gets 0. Both have their own x=5 (COW).' },
    { text: '    if (pid == 0) {',         note: 'This branch runs only in the <em>child</em> (pid==0).' },
    { text: '        x = 10;',            note: 'Child writes x=10. COW triggers: a new page is allocated for child. Parent x is still 5.' },
    { text: '        printf("Child: x=%d pid=%d\\n", x, getpid());', note: 'Child prints x=10 and its own PID.' },
    { text: '    } else {',               note: 'This branch runs in the <em>parent</em> (pid > 0).' },
    { text: '        printf("Parent: x=%d pid=%d\\n", x, getpid());', note: 'Parent prints x=5 (unchanged) and its PID.' },
    { text: '        wait(NULL);',         note: 'Parent blocks here until child exits. Prevents zombie.' },
    { text: '    }',                       note: null },
    { text: '    return 0;',              note: 'Both processes reach return 0 independently.' },
    { text: '}',                           note: null },
  ],
  steps: [
    { line: 5, proc: 'P1', annotation: 'Process starts. <strong>x = 5</strong> in parent\'s address space.', tree: [{id:'P1',label:'Parent\nPID=1000',x:350,y:60,state:'running'}] },
    { line: 6, proc: 'P1', annotation: '<strong>fork()</strong> called. Kernel duplicates the process.', tree: [{id:'P1',label:'Parent\nPID=1000',x:250,y:60,state:'running'},{id:'P2',label:'Child\nPID=1001',x:470,y:60,state:'new'}], forkEdge:{from:'P1',to:'P2'} },
    { line: 7, proc: 'both', annotation: 'Fork returns. <strong>Parent</strong> gets pid=1001; <strong>Child</strong> gets pid=0. Both run concurrently.', tree: [{id:'P1',label:'Parent\nPID=1000\npid=1001',x:200,y:130,state:'running'},{id:'P2',label:'Child\nPID=1001\npid=0',x:500,y:130,state:'running'}], edges:[{from:'P1',to:'P2',label:'fork()'}] },
    { line: 8, proc: 'P2', annotation: 'Child enters if(pid==0) branch. <strong>x = 10</strong>. COW: new physical page allocated for child. Parent x still = 5.', tree: [{id:'P1',label:'Parent\nx=5',x:200,y:130,state:'running'},{id:'P2',label:'Child\nx=10\n(COW)',x:500,y:130,state:'running'}], edges:[{from:'P1orig',to:'P2',label:'fork()'}] },
    { line: 9, proc: 'P2', annotation: 'Child prints. Note: output order vs parent is <em>non-deterministic</em>.', tree: [{id:'P1',label:'Parent\nx=5',x:200,y:130,state:'running'},{id:'P2',label:'Child\nprinting...',x:500,y:130,state:'running'}], edges:[{from:'P1orig',to:'P2',label:'fork()'}], output:'Child: x=10 pid=1001' },
    { line: 11, proc: 'P1', annotation: 'Parent enters else branch. Prints x=5.', tree: [{id:'P1',label:'Parent\nprinting...',x:200,y:130,state:'running'},{id:'P2',label:'Child\nDone',x:500,y:130,state:'zombie'}], edges:[{from:'P1orig',to:'P2',label:'fork()'}], output:'Parent: x=5 pid=1000' },
    { line: 12, proc: 'P1', annotation: '<strong>wait(NULL)</strong> — parent blocks until child exits. Child becomes zombie briefly.', tree: [{id:'P1',label:'Parent\nwait()...',x:200,y:130,state:'waiting'},{id:'P2',label:'Child\nZombie 🧟',x:500,y:130,state:'zombie'}], edges:[{from:'P1orig',to:'P2',label:'fork()'}] },
    { line: 14, proc: 'P1', annotation: 'Child reaped. Parent continues. Both call <strong>return 0</strong> independently.', tree: [{id:'P1',label:'Parent\nDone',x:350,y:130,state:'done'}], edges:[] },
  ],
  quiz: [
    { q:'What value does the parent print for x?', opts:['x=10','x=5','x=0','Undefined — shared memory'], ans:1, exp:'fork() copies the address space. Parent x was 5 and was never changed by the parent.' },
    { q:'What does fork() return in the child process?', opts:['The parent\'s PID','The child\'s own PID','0','-1'], ans:2, exp:'fork() returns 0 to the child. It returns the child\'s PID to the parent.' },
    { q:'What happens if wait(NULL) is removed?', opts:['Child never runs','Parent runs twice','Child may become a zombie process','Both processes crash'], ans:2, exp:'Without wait(), the parent may exit before reaping the child, leaving a zombie (Z state) in the process table.' },
  ]
},
B: {
  title: "fork() + exec()",
  code: [
    { text: '#include <stdio.h>',      note: null },
    { text: '#include <unistd.h>',     note: null },
    { text: '#include <sys/wait.h>',   note: null },
    { text: '',                        note: null },
    { text: 'int main() {',           note: null },
    { text: '    pid_t pid = fork();', note: 'fork(): creates a copy of this process.' },
    { text: '    if (pid == 0) {',     note: 'Child branch.' },
    { text: '        char *args[] = {"/bin/ls","-l",NULL};', note: 'Prepare argv[] for exec.' },
    { text: '        execvp(args[0], args);', note: '<strong>execvp</strong>: replaces child\'s entire address space with /bin/ls. Text, data, heap, stack all replaced.' },
    { text: '        printf("This never prints\\n");', note: 'This line is NEVER reached if exec() succeeds — the child is now /bin/ls.' },
    { text: '    } else {',            note: 'Parent branch.' },
    { text: '        wait(NULL);',     note: 'Parent waits for child (/bin/ls) to finish.' },
    { text: '        printf("Child done\\n");', note: 'Parent prints after ls exits.' },
    { text: '    }',                   note: null },
    { text: '    return 0;',          note: null },
    { text: '}',                       note: null },
  ],
  steps: [
    { line: 5, proc: 'P1', annotation: 'Process starts.', tree: [{id:'P1',label:'Parent\nPID=2000',x:350,y:60,state:'running'}] },
    { line: 5, proc: 'P1', annotation: '<strong>fork()</strong> — duplicates process.', tree: [{id:'P1',label:'Parent\nPID=2000',x:200,y:60,state:'running'},{id:'P2',label:'Child\nPID=2001',x:500,y:60,state:'new'}], forkEdge:{from:'P1',to:'P2'} },
    { line: 6, proc: 'P2', annotation: 'Child: pid=0 so enters if branch. Prepares execvp args.', tree: [{id:'P1',label:'Parent\nwaiting',x:200,y:130,state:'waiting'},{id:'P2',label:'Child\n(pre-exec)',x:500,y:130,state:'running'}], edges:[{from:'P1orig',to:'P2',label:'fork()'}] },
    { line: 8, proc: 'P2', annotation: '<strong>execvp("/bin/ls", args)</strong> — child\'s address space is <em>completely replaced</em> with /bin/ls. PID stays 2001.', tree: [{id:'P1',label:'Parent\nwait()...',x:200,y:130,state:'waiting'},{id:'P2',label:'/bin/ls\nPID=2001\n(exec)',x:500,y:130,state:'running',exec:true}], edges:[{from:'P1orig',to:'P2',label:'fork()→exec()'}] },
    { line: 9, proc: 'P2', annotation: 'Line 10 ("This never prints") is <strong>unreachable</strong> — exec replaced the entire program image.', tree: [{id:'P1',label:'Parent\nwait()...',x:200,y:130,state:'waiting'},{id:'P2',label:'/bin/ls\nrunning...',x:500,y:130,state:'running',exec:true}], edges:[{from:'P1orig',to:'P2',label:'fork()→exec()'}], output:'(ls -l output appears here)' },
    { line: 11, proc: 'P1', annotation: '/bin/ls exits. Parent\'s wait() returns. Parent prints "Child done".', tree: [{id:'P1',label:'Parent\nprinting...',x:350,y:130,state:'running'}], edges:[], output:'Child done' },
  ],
  quiz: [
    { q:'After execvp() succeeds, what happens to the child\'s original code?', opts:['It continues from the next line','It is completely replaced by the new program','It runs in parallel with the new program','It is saved and can be restored'], ans:1, exp:'exec() replaces the process image entirely — text, data, heap, stack. The original code is gone.' },
    { q:'What PID does /bin/ls have after execvp()?', opts:['A new PID assigned by the kernel','2001 — same as the child that called exec()','2000 — it inherits the parent PID','0 — same as fork() return'], ans:1, exp:'exec() preserves the PID. The process remains PID 2001 — only the program image changes.' },
    { q:'What does "This never prints" tell us about exec()?', opts:['exec() skips printf statements','exec() only runs on success — if it returns, an error occurred','exec() forks another process first','printf is not available after exec()'], ans:1, exp:'exec() does not return on success. Any code after exec() only runs if exec() itself failed (e.g., file not found).' },
  ]
},
C: {
  title: "Double fork (4 processes)",
  code: [
    { text: '#include <stdio.h>',         note: null },
    { text: '#include <unistd.h>',        note: null },
    { text: '',                           note: null },
    { text: 'int main() {',              note: null },
    { text: '    fork();',               note: 'First fork(): 1 process becomes 2 (P1 and P2).' },
    { text: '    fork();',               note: 'Second fork(): BOTH P1 and P2 call fork(). 2 processes become 4 (P1, P2, P3, P4).' },
    { text: '    printf("Hello from PID %d\\n", getpid());', note: 'All 4 processes print independently. Order is non-deterministic.' },
    { text: '    return 0;',             note: 'All 4 processes exit.' },
    { text: '}',                          note: null },
  ],
  steps: [
    { line: 3, proc: 'P1', annotation: 'Start: 1 process.', tree: [{id:'P1',label:'P1\nPID=3000',x:350,y:50,state:'running'}] },
    { line: 4, proc: 'P1', annotation: '<strong>First fork()</strong>: P1 creates P2. Now 2 processes.', tree: [{id:'P1',label:'P1\nPID=3000',x:200,y:50,state:'running'},{id:'P2',label:'P2\nPID=3001',x:500,y:50,state:'new'}], edges:[{from:'P1',to:'P2',label:'fork() #1'}] },
    { line: 5, proc: 'both', annotation: '<strong>Second fork()</strong>: BOTH P1 and P2 call fork(). P1 creates P3; P2 creates P4. Now 4 processes.', tree: [{id:'P1',label:'P1\n3000',x:130,y:180,state:'running'},{id:'P2',label:'P2\n3001',x:380,y:180,state:'running'},{id:'P3',label:'P3\n3002',x:250,y:180,state:'new'},{id:'P4',label:'P4\n3003',x:510,y:180,state:'new'}], edges:[{from:'P1',to:'P2',label:'fork #1'},{from:'P1',to:'P3',label:'fork #2'},{from:'P2',to:'P4',label:'fork #2'}] },
    { line: 6, proc: 'all', annotation: 'All 4 processes print. Order is <em>non-deterministic</em> — depends on the scheduler.', tree: [{id:'P1',label:'P1\nprinting',x:100,y:260,state:'running'},{id:'P2',label:'P2\nprinting',x:270,y:260,state:'running'},{id:'P3',label:'P3\nprinting',x:440,y:260,state:'running'},{id:'P4',label:'P4\nprinting',x:610,y:260,state:'running'}], edges:[{from:'P1old',to:'P2',label:'fork #1'},{from:'P1old',to:'P3',label:'fork #2'},{from:'P2old',to:'P4',label:'fork #2'}], output:'Hello from PID 3000\nHello from PID 3001\nHello from PID 3002\nHello from PID 3003\n(order varies)' },
    { line: 7, proc: 'all', annotation: 'All 4 processes call return 0 and exit independently.', tree: [], edges:[], annotation2:'4 processes created. Rule: n fork() calls → 2ⁿ processes.' },
  ],
  quiz: [
    { q:'How many processes does the following code create in total?\n\nfork(); fork(); fork();', opts:['3','4','6','8'], ans:3, exp:'Each fork() doubles the number of processes: 1→2→4→8. n fork() calls create 2ⁿ processes.' },
    { q:'How many times will "Hello" be printed in Scenario C?', opts:['1','2','3','4'], ans:3, exp:'There are 4 processes (2² from 2 fork() calls) and each prints once.' },
    { q:'In Scenario C, is the print order of the 4 processes guaranteed?', opts:['Yes — parent always prints first','Yes — by PID order','No — the scheduler decides the order','No — only the child prints'], ans:2, exp:'Print order is non-deterministic. The CPU scheduler may interleave the 4 processes in any order.' },
  ]
}
};

let currentScenario = null;
let currentStep = -1;
let autoTimer = null;
let quizAnswered = {};

function loadScenario() {
  clearInterval(autoTimer);
  autoTimer = null;
  document.getElementById('autoBtn').textContent = '⏱ Auto';
  const key = document.getElementById('scenarioSelect').value;
  currentScenario = scenarios[key];
  currentStep = -1;
  quizAnswered = {};
  renderCode();
  clearTree();
  document.getElementById('annotation').innerHTML = 'Press <strong>Step</strong> to begin execution trace.';
  document.getElementById('stepCounter').textContent = 'Step 0 — ' + currentScenario.title;
  document.getElementById('stepBtn').disabled = false;
  document.getElementById('quizOverlay').classList.remove('active');
}

function renderCode() {
  const panel = document.getElementById('codePanel');
  panel.innerHTML = '';
  currentScenario.code.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'code-line';
    div.id = `cl-${i}`;
    div.innerHTML = `<span class="ln">${i+1}</span><span class="code">${syntaxHighlight(line.text)}</span>`;
    panel.appendChild(div);
  });
}

function syntaxHighlight(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\b(int|char|void|return|if|else|while|for|NULL)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(pid_t|FILE)\b/g,'<span class="ty">$1</span>')
    .replace(/(fork|exec|execvp|printf|wait|waitpid|getpid|perror|exit)\b/g,'<span class="fn">$1</span>')
    .replace(/"([^"]*)"/g,'<span class="str">"$1"</span>')
    .replace(/\/\/.*/g, m => `<span class="cm">${m}</span>`)
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}

function clearTree() {
  const svg = document.getElementById('treeSvg');
  svg.innerHTML = '';
}

function doStep() {
  if (!currentScenario) { loadScenario(); return; }
  currentStep++;
  const steps = currentScenario.steps;
  if (currentStep >= steps.length) {
    // Show quiz
    showQuiz();
    clearInterval(autoTimer);
    autoTimer = null;
    document.getElementById('autoBtn').textContent = '⏱ Auto';
    return;
  }
  const step = steps[currentStep];
  // Highlight code line
  document.querySelectorAll('.code-line').forEach(el => el.classList.remove('current'));
  const lineEl = document.getElementById(`cl-${step.line}`);
  if (lineEl) { lineEl.classList.add('current'); lineEl.scrollIntoView({block:'nearest'}); }
  // Update annotation
  let annHTML = step.annotation || '';
  if (step.output) annHTML += ` <br><strong style="color:#a3e635">Output:</strong> <code style="color:#a3e635;background:#0f172a;padding:0.1rem 0.4rem;border-radius:4px">${step.output.replace(/\n/g,'<br>')}</code>`;
  document.getElementById('annotation').innerHTML = annHTML;
  // Draw tree
  drawTree(step);
  document.getElementById('stepCounter').textContent = `Step ${currentStep+1} / ${steps.length} — ${currentScenario.title}`;
  if (currentStep === steps.length - 1) {
    document.getElementById('stepBtn').textContent = '🧠 Quiz';
  }
}

function drawTree(step) {
  const svg = document.getElementById('treeSvg');
  svg.innerHTML = '';
  const procs = step.tree || [];
  const edges = step.edges || [];

  // Draw edges
  const procMap = {};
  procs.forEach(p => procMap[p.id] = p);

  edges.forEach(e => {
    const from = procMap[e.from] || procMap[e.from + 'orig'] || procMap[e.from.replace('orig','')];
    const to = procMap[e.to];
    if (!from || !to) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', from.x); line.setAttribute('y1', from.y + 40);
    line.setAttribute('x2', to.x); line.setAttribute('y2', to.y - 40);
    line.setAttribute('stroke','#ff8c00'); line.setAttribute('stroke-width','2');
    line.setAttribute('stroke-dasharray','4,3');
    svg.appendChild(line);
    if (e.label) {
      const tx = (from.x + to.x)/2, ty = (from.y + 40 + to.y - 40)/2;
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',tx); t.setAttribute('y',ty-6);
      t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','10');
      t.setAttribute('fill','#ff8c00');
      t.textContent = e.label;
      svg.appendChild(t);
    }
  });

  // Draw process boxes
  procs.forEach(p => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    const W = 100, H = 70;
    const x = p.x - W/2, y = p.y - H/2;
    const colors = {
      running: {fill:'#003366', stroke:'#4a80c4'},
      new: {fill:'#1e3a5f', stroke:'#60a5fa'},
      waiting: {fill:'#3b2200', stroke:'#ff8c00'},
      zombie: {fill:'#3b0000', stroke:'#ef4444'},
      done: {fill:'#14532d', stroke:'#22c55e'},
    };
    const col = colors[p.state] || colors.running;

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x); rect.setAttribute('y',y);
    rect.setAttribute('width',W); rect.setAttribute('height',H);
    rect.setAttribute('rx','10');
    rect.setAttribute('fill', p.exec ? '#2d0a3a' : col.fill);
    rect.setAttribute('stroke', p.exec ? '#c084fc' : col.stroke);
    rect.setAttribute('stroke-width','2');
    g.appendChild(rect);

    const lines = p.label.split('\n');
    lines.forEach((ln, i) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', p.x);
      t.setAttribute('y', p.y - ((lines.length-1) * 9) + i * 18);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('fill','#e2e8f0');
      t.setAttribute('font-size', i===0 ? '13' : '10');
      t.setAttribute('font-weight', i===0 ? '700' : '400');
      t.textContent = ln;
      g.appendChild(t);
    });

    svg.appendChild(g);
  });

  // fork arrow
  if (step.forkEdge) {
    const from = procMap[step.forkEdge.from];
    const to = procMap[step.forkEdge.to];
    if (from && to) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',from.x+50); line.setAttribute('y1',from.y);
      line.setAttribute('x2',to.x-50); line.setAttribute('y2',to.y);
      line.setAttribute('stroke','#ff8c00'); line.setAttribute('stroke-width','2.5');
      svg.insertBefore(line, svg.firstChild);
    }
  }
}

function showQuiz() {
  const q = currentScenario.quiz;
  let html = '';
  q.forEach((item, i) => {
    html += `<div class="q-block" id="qb-${i}">
      <p><strong>Q${i+1}.</strong> ${item.q.replace(/\n/g,'<br>')}</p>`;
    item.opts.forEach((opt, j) => {
      html += `<button class="q-option" id="q${i}o${j}" onclick="answerQ(${i},${j})">${opt}</button>`;
    });
    html += `<div class="q-explanation" id="qexp-${i}">💡 ${item.exp}</div></div>`;
  });
  document.getElementById('quizContent').innerHTML = html;
  document.getElementById('quizOverlay').classList.add('active');
}

function answerQ(qi, oi) {
  if (quizAnswered[qi]) return;
  quizAnswered[qi] = true;
  const q = currentScenario.quiz[qi];
  for (let j = 0; j < q.opts.length; j++) {
    const btn = document.getElementById(`q${qi}o${j}`);
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('correct-ans');
    else if (j === oi && oi !== q.ans) btn.classList.add('wrong-ans');
  }
  document.getElementById(`qexp-${qi}`).classList.add('show');
}

function toggleAuto() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
    document.getElementById('autoBtn').textContent = '⏱ Auto';
  } else {
    document.getElementById('autoBtn').textContent = '⏸ Pause';
    autoTimer = setInterval(() => {
      if (currentStep >= (currentScenario?.steps?.length || 0) - 1) {
        clearInterval(autoTimer); autoTimer = null;
        document.getElementById('autoBtn').textContent = '⏱ Auto';
        doStep();
      } else {
        doStep();
      }
    }, 1500);
  }
}

function resetScenario() {
  clearInterval(autoTimer);
  autoTimer = null;
  document.getElementById('autoBtn').textContent = '⏱ Auto';
  loadScenario();
}

// Init
loadScenario();
</script>
