<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS4023 Submission Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; }

  header {
    background: #003366; color: #fff;
    padding: 18px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.3rem; font-weight: 600; }
  header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }

  main { max-width: 780px; margin: 32px auto; padding: 0 16px; }

  .card {
    background: #fff; border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    padding: 24px; margin-bottom: 24px;
  }
  .card h2 { font-size: 1rem; font-weight: 600; color: #003366; margin-bottom: 16px; }

  .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }

  label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-bottom: 6px; }

  select, input[type=file] {
    border: 1.5px solid #ccd3de; border-radius: 6px;
    padding: 8px 12px; font-size: 0.9rem;
    background: #fff; color: #222;
    width: 100%;
  }
  select { cursor: pointer; }

  .field { flex: 1; min-width: 180px; }

  button#check-btn {
    background: #003366; color: #fff;
    border: none; border-radius: 6px;
    padding: 10px 28px; font-size: 0.95rem;
    cursor: pointer; font-weight: 600;
    margin-top: 8px;
  }
  button#check-btn:hover { background: #00509e; }
  button#check-btn:disabled { background: #aaa; cursor: default; }

  #results { display: none; }

  .summary-bar {
    border-radius: 8px; padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    font-weight: 600; font-size: 1rem;
    margin-bottom: 20px;
  }
  .summary-bar.pass { background: #d4edda; color: #155724; border: 1px solid #b8dfc1; }
  .summary-bar.fail { background: #f8d7da; color: #721c24; border: 1px solid #f1b8bc; }
  .summary-bar.warn { background: #fff3cd; color: #856404; border: 1px solid #ffe8a1; }

  .check-list { list-style: none; }
  .check-list li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #eee;
    font-size: 0.9rem;
  }
  .check-list li:last-child { border-bottom: none; }

  .icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .pass-icon { color: #28a745; }
  .fail-icon { color: #dc3545; }
  .warn-icon { color: #e6a817; }
  .info-icon { color: #6c757d; }

  .check-text strong { display: block; font-weight: 600; }
  .check-text span   { color: #555; font-size: 0.82rem; }

  .file-tree {
    background: #f8f9fa; border: 1px solid #dee2e6;
    border-radius: 6px; padding: 12px 16px;
    font-family: 'Consolas', monospace; font-size: 0.8rem;
    max-height: 220px; overflow-y: auto;
    margin-top: 12px; line-height: 1.7;
    color: #333;
  }
  .file-tree .dir  { color: #003366; font-weight: 600; }
  .file-tree .file { padding-left: 18px; }
  .file-tree .bad  { color: #dc3545; }
  .file-tree .warn { color: #e6a817; }

  #error-msg {
    background: #f8d7da; color: #721c24;
    border: 1px solid #f1b8bc; border-radius: 6px;
    padding: 12px 16px; font-size: 0.9rem;
    display: none; margin-top: 12px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>CS4023 Operating Systems — Submission Structure Checker</h1>
    <p>Validate your zip file before uploading to Brightspace. Fix all ❌ issues before submitting.</p>
  </div>
</header>

<main>
  <div class="card">
    <h2>Step 1 — Select your project and zip file</h2>
    <div class="row">
      <div class="field">
        <label for="project-select">Project</label>
        <select id="project-select">
          <option value="">— choose project —</option>
          <option value="1">Project 1 – Mini-Shell</option>
          <option value="2">Project 2 – Parallel Matrix Multiply</option>
          <option value="3">Project 3 – Readers-Writers</option>
          <option value="4">Project 4 – CPU Scheduling Simulator</option>
          <option value="5">Project 5 – Page Replacement Simulator</option>
        </select>
      </div>
      <div class="field">
        <label for="zip-input">Your zip file</label>
        <input type="file" id="zip-input" accept=".zip">
      </div>
    </div>
    <button id="check-btn" disabled>Check Submission</button>
    <div id="error-msg"></div>
  </div>

  <div id="results">
    <div class="card">
      <h2>Results</h2>
      <div id="summary-bar" class="summary-bar"></div>
      <ul id="check-list" class="check-list"></ul>
    </div>
    <div class="card">
      <h2>Contents of your zip</h2>
      <div id="file-tree" class="file-tree"></div>
    </div>
  </div>
</main>

<script>
// ─── Minimal ZIP central-directory parser (no external libraries) ───────────
function listZipEntries(buffer) {
  const view  = new DataView(buffer);
  const bytes = new Uint8Array(buffer);
  const dec   = new TextDecoder('utf-8');

  // Find End of Central Directory (EOCD) signature 0x06054b50
  let eocd = -1;
  for (let i = buffer.byteLength - 22; i >= Math.max(0, buffer.byteLength - 65558); i--) {
    if (view.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd === -1) throw new Error('Not a valid ZIP file (EOCD signature not found).');

  const cdCount  = view.getUint16(eocd + 8,  true);
  let   cdOffset = view.getUint32(eocd + 16, true);

  // Handle ZIP64
  if (cdOffset === 0xFFFFFFFF) throw new Error('ZIP64 format not supported. Please use a standard zip tool.');

  const entries = [];
  let pos = cdOffset;
  for (let i = 0; i < cdCount; i++) {
    if (view.getUint32(pos, true) !== 0x02014b50) break;
    const fnLen  = view.getUint16(pos + 28, true);
    const exLen  = view.getUint16(pos + 30, true);
    const cmLen  = view.getUint16(pos + 32, true);
    const name   = dec.decode(bytes.slice(pos + 46, pos + 46 + fnLen));
    entries.push(name);
    pos += 46 + fnLen + exLen + cmLen;
  }
  return entries;
}

// ─── Per-project config ──────────────────────────────────────────────────────────
// extraCodeFiles: additional required files inside code/ (beyond Makefile + *.c)
const PROJECT_SPECS = {
  '1': { name: 'Mini-Shell',              extraCodeFiles: [] },
  '2': { name: 'Parallel Matrix Multiply', extraCodeFiles: [] },
  '3': { name: 'Readers-Writers',          extraCodeFiles: [] },
  '4': { name: 'CPU Scheduling Simulator', extraCodeFiles: ['sample_processes.txt'] },
  '5': { name: 'Page Replacement',         extraCodeFiles: ['sample_refs.txt', 'belady_demo.txt'] },
};

const BANNED_EXTENSIONS = ['.o', '.a', '.so', '.exe', '.out'];
const BANNED_NAMES      = ['.DS_Store', 'Thumbs.db'];
const BANNED_DIRS       = ['__MACOSX', '.git', 'node_modules'];

// ─── Main validation ───────────────────────────────────────────────────────────────
// Expected structure (matches Project Specification):
//   <StudentID>_Project<N>.zip
//   └── project_N/
//       ├── code/
//       │   ├── shell.c  (or other .c files)
//       │   └── Makefile
//       ├── ai_log/
//       │   └── <at least one log file>
//       └── README.md
function validate(filename, entries, projectId) {
  const spec    = PROJECT_SPECS[projectId];
  const results = [];

  // ── 1. Zip filename format ───────────────────────────────────────────────
  const zipNameNoExt = filename.replace(/.zip$/i, '');
  // Accept: <StudentID>_Project<N>  e.g. A12345678_Project1 or 12345678_Project1
  const namePattern = new RegExp('^[A-Za-z0-9]+_Project' + projectId + '$');
  const nameOk      = namePattern.test(zipNameNoExt);

  if (!nameOk) {
    results.push({ status: 'fail', title: 'Zip filename format',
      detail: 'Expected: <StudentID>_Project' + projectId + '.zip  (e.g. A12345678_Project' + projectId + '.zip). Got: "' + filename + '"' });
  } else {
    results.push({ status: 'pass', title: 'Zip filename format',
      detail: '"' + filename + '" — correct format.' });
  }

  // ── 2. Single top-level folder = project_N ─────────────────────────────────
  const topDirs  = [...new Set(entries.map(e => e.split('/')[0]).filter(Boolean))];
  const topFiles = entries.filter(e => !e.includes('/') && !e.endsWith('/'));

  if (topFiles.length > 0) {
    results.push({ status: 'fail', title: 'Loose files at zip root',
      detail: 'Found files outside any folder: ' + topFiles.join(', ') + '. Everything must be inside project_' + projectId + '/.' });
  }

  if (topDirs.length === 0) {
    results.push({ status: 'fail', title: 'No top-level folder found', detail: 'The zip appears empty.' });
    return results;
  }

  const realTopDirs = topDirs.filter(d => !BANNED_DIRS.includes(d));
  if (realTopDirs.length > 1) {
    results.push({ status: 'fail', title: 'Multiple top-level folders',
      detail: 'Found: ' + realTopDirs.join(', ') + '. There must be exactly one: project_' + projectId + '.' });
  }

  const rootDir    = realTopDirs[0] || topDirs[0];
  const expectRoot = 'project_' + projectId;

  if (rootDir !== expectRoot) {
    results.push({ status: 'fail', title: 'Top-level folder name',
      detail: 'Expected "' + expectRoot + '" but found "' + rootDir + '". The folder must be named exactly project_' + projectId + '.' });
  } else {
    results.push({ status: 'pass', title: 'Top-level folder name',
      detail: '"' + rootDir + '" — correct.' });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  const inDir    = (dir, name) => entries.includes(dir + '/' + name) || entries.includes(dir + '/' + name + '/');
  const allInDir = dir => entries
    .filter(e => e.startsWith(dir + '/') && e !== dir + '/')
    .map(e => e.slice(dir.length + 1));

  const codeDir   = rootDir + '/code';
  const aiLogDir  = rootDir + '/ai_log';

  // ── 3. code/ sub-folder ──────────────────────────────────────────────────────
  const hasCodeDir = entries.some(e => e === codeDir + '/' || e.startsWith(codeDir + '/'));
  if (!hasCodeDir) {
    results.push({ status: 'fail', title: 'code/ folder missing',
      detail: 'Expected a code/ sub-folder inside project_' + projectId + '/ containing your .c files and Makefile.' });
  } else {
    results.push({ status: 'pass', title: 'code/ folder present', detail: '' });
  }

  // ── 4. Makefile inside code/ ────────────────────────────────────────────────
  const filesInCode = allInDir(codeDir).filter(e => !e.includes('/'));
  if (inDir(codeDir, 'Makefile')) {
    results.push({ status: 'pass', title: 'Makefile present (code/Makefile)', detail: '' });
  } else if (filesInCode.some(f => f.toLowerCase() === 'makefile')) {
    results.push({ status: 'fail', title: 'Makefile — wrong capitalisation',
      detail: 'Linux is case-sensitive. Must be exactly "Makefile" (capital M) inside code/.' });
  } else {
    results.push({ status: 'fail', title: 'Makefile missing',
      detail: 'No Makefile found in code/. The grading script will fail without it.' });
  }

  // ── 5. At least one .c file inside code/ ─────────────────────────────────────
  const cFiles = filesInCode.filter(f => f.endsWith('.c'));
  if (cFiles.length > 0) {
    results.push({ status: 'pass', title: 'C source file(s) in code/', detail: cFiles.join(', ') });
  } else {
    results.push({ status: 'fail', title: 'No .c source files in code/', detail: 'No C source files found in code/.' });
  }

  // ── 6. Project-specific extra files in code/ ────────────────────────────────
  for (const req of spec.extraCodeFiles) {
    if (inDir(codeDir, req)) {
      results.push({ status: 'pass', title: 'code/' + req + ' present', detail: '' });
    } else {
      results.push({ status: 'fail', title: 'code/' + req + ' missing',
        detail: 'Project ' + projectId + ' requires "' + req + '" inside the code/ folder.' });
    }
  }

  // ── 7. ai_log/ sub-folder with at least one file ──────────────────────────────
  const hasAiLogDir  = entries.some(e => e === aiLogDir + '/' || e.startsWith(aiLogDir + '/'));
  const filesInAiLog = allInDir(aiLogDir).filter(e => !e.endsWith('/'));
  if (!hasAiLogDir) {
    results.push({ status: 'fail', title: 'ai_log/ folder missing',
      detail: 'Expected an ai_log/ sub-folder inside project_' + projectId + '/. Without AI logs, Criteria 2 and 3 are capped at 40%.' });
  } else if (filesInAiLog.length === 0) {
    results.push({ status: 'fail', title: 'ai_log/ folder is empty',
      detail: 'The ai_log/ folder exists but contains no files. Add your AI conversation log(s) here.' });
  } else {
    results.push({ status: 'pass', title: 'ai_log/ folder present with files',
      detail: filesInAiLog.join(', ') });
  }

  // ── 8. README.md at project root ─────────────────────────────────────────────────
  const directInRoot = allInDir(rootDir).filter(e => !e.includes('/'));
  if (inDir(rootDir, 'README.md')) {
    results.push({ status: 'pass', title: 'README.md present', detail: '' });
  } else if (directInRoot.some(f => f.toLowerCase() === 'readme.md')) {
    results.push({ status: 'fail', title: 'README.md — wrong capitalisation',
      detail: 'Found a readme.md but capitalisation is wrong. Must be exactly "README.md".' });
  } else {
    results.push({ status: 'fail', title: 'README.md missing',
      detail: 'Required: README.md directly inside project_' + projectId + '/. See the spec for the 7 required headings.' });
  }

  // ── 9. Compiled artefacts ───────────────────────────────────────────────────────────
  const bannedFound = entries.filter(e => {
    const base = e.split('/').pop();
    const ext  = base.includes('.') ? '.' + base.split('.').pop().toLowerCase() : '';
    return BANNED_EXTENSIONS.includes(ext) || BANNED_NAMES.includes(base);
  });
  if (bannedFound.length > 0) {
    results.push({ status: 'warn', title: 'Compiled/build artefacts in zip',
      detail: 'Remove before submitting: ' + bannedFound.join(', ') + '. Run "make clean" first.' });
  }

  // ── 10. Mac metadata ──────────────────────────────────────────────────────────────────
  if (entries.some(e => e.startsWith('__MACOSX'))) {
    results.push({ status: 'warn', title: 'Mac metadata folder present (__MACOSX)',
      detail: 'On macOS, zip with: zip -r A12345678_Project' + projectId + '.zip project_' + projectId + '/ -x "*.DS_Store" -x "__MACOSX"' });
  }

  return results;
}

function icon(status) {
  return {
    pass: '<span class="icon pass-icon">✅</span>',
    fail: '<span class="icon fail-icon">❌</span>',
    warn: '<span class="icon warn-icon">⚠️</span>',
    info: '<span class="icon info-icon">ℹ️</span>',
  }[status] || '';
}

function renderResults(filename, entries, results, projectId) {
  document.getElementById('results').style.display = 'block';

  const failures  = results.filter(r => r.status === 'fail').length;
  const warnings  = results.filter(r => r.status === 'warn').length;

  const bar = document.getElementById('summary-bar');
  if (failures > 0) {
    bar.className = 'summary-bar fail';
    bar.innerHTML = `❌ &nbsp; ${failures} issue${failures > 1 ? 's' : ''} must be fixed before submitting` +
      (warnings > 0 ? ` &nbsp;·&nbsp; ${warnings} warning${warnings > 1 ? 's' : ''}` : '');
  } else if (warnings > 0) {
    bar.className = 'summary-bar warn';
    bar.innerHTML = `⚠️ &nbsp; Structure looks correct but ${warnings} warning${warnings > 1 ? 's' : ''} — review before submitting`;
  } else {
    bar.className = 'summary-bar pass';
    bar.innerHTML = `✅ &nbsp; Structure is correct — safe to submit`;
  }

  const list = document.getElementById('check-list');
  list.innerHTML = results.map(r =>
    `<li>
      ${icon(r.status)}
      <div class="check-text">
        <strong>${r.title}</strong>
        ${r.detail ? `<span>${r.detail}</span>` : ''}
      </div>
    </li>`
  ).join('');

  // File tree
  const spec    = PROJECT_SPECS[projectId];
  const rootDir = [...new Set(entries.map(e => e.split('/')[0]).filter(Boolean))]
    .find(d => !['__MACOSX', '.git'].includes(d)) || '(root)';

  const allRequired = ['Makefile', 'README.md', ...spec.extraCodeFiles];

  const treeLines = [`<span class="dir">${rootDir}/</span>`];
  entries
    .filter(e => e.startsWith(rootDir + '/') && e !== rootDir + '/')
    .sort()
    .forEach(e => {
      const rel  = e.slice(rootDir.length + 1);
      const base = rel.split('/').pop() || rel;
      const ext  = base.includes('.') ? '.' + base.split('.').pop().toLowerCase() : '';
      let cls = 'file';
      if (BANNED_EXTENSIONS.includes(ext) || BANNED_NAMES.includes(base)) cls = 'file bad';
      else if (base.startsWith('__MACOSX') || base === '.DS_Store') cls = 'file warn';
      treeLines.push(`<span class="${cls}">${rel}</span>`);
    });

  document.getElementById('file-tree').innerHTML = treeLines.join('\n');
}

// ─── Wiring ───────────────────────────────────────────────────────────────────
const projectSelect = document.getElementById('project-select');
const zipInput      = document.getElementById('zip-input');
const checkBtn      = document.getElementById('check-btn');
const errorMsg      = document.getElementById('error-msg');

function updateBtn() {
  checkBtn.disabled = !(projectSelect.value && zipInput.files.length > 0);
}
projectSelect.addEventListener('change', updateBtn);
zipInput.addEventListener('change', updateBtn);

checkBtn.addEventListener('click', () => {
  errorMsg.style.display = 'none';
  document.getElementById('results').style.display = 'none';

  const file      = zipInput.files[0];
  const projectId = projectSelect.value;
  if (!file || !projectId) return;

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const entries = listZipEntries(e.target.result);
      const results = validate(file.name, entries, projectId);
      renderResults(file.name, entries, results, projectId);
    } catch (err) {
      errorMsg.textContent = '⚠️ Could not read zip file: ' + err.message;
      errorMsg.style.display = 'block';
    }
  };
  reader.readAsArrayBuffer(file);
});
</script>
</body>
</html>
